name: Security - npm audit and Snyk

on:
  push:
    branches:
      - main
      - Master
      - Dev
      - Qa
      - PRD
  pull_request:
    branches:
      - main
      - Master
      - Dev
      - Qa
      - PRD
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Generate npm audit report
        run: |
          mkdir -p security-reports
          npm audit --json > security-reports/npm-audit-report.json || true
        continue-on-error: true

      - name: Run Snyk Open Source scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium --json-file-output=security-reports/snyk-report.json

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: security-reports/
          retention-days: 7